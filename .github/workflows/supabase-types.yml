name: Regenerate Supabase types

# Why: frontend/src/integrations/supabase/types.ts drifts as the schema
# changes. When stale, every Supabase query against a renamed/added
# column trips a SelectQueryError that cascades through the codebase
# (we hit ~thousands of these in PR #145). This action keeps the
# generated types in sync by regenerating them on a schedule and
# opening a PR when there's a delta.
#
# Setup (one-time): add a `SUPABASE_ACCESS_TOKEN` secret in
# Settings → Secrets and variables → Actions. Generate the token at
# https://supabase.com/dashboard/account/tokens. Without the secret
# this action exits early instead of failing.

on:
  schedule:
    # Weekly, Monday 06:00 UTC (1am ET) — pre-business-hours so a
    # PR is waiting when the team starts.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Bail if no Supabase token configured
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping. See workflow header for setup."
            exit 0
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Regenerate types
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npm run types:supabase

      - name: Open PR if types changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(types): regenerate supabase types"
          title: "chore(types): regenerate supabase types"
          branch: chore/regen-supabase-types
          delete-branch: true
          add-paths: frontend/src/integrations/supabase/types.ts
          body: |
            Automated weekly regeneration of `frontend/src/integrations/supabase/types.ts`
            from the live Supabase schema (project `xlobevmhzimxjtpiontf`).

            Merging keeps the generated types in sync so Supabase queries
            don't trip `SelectQueryError` on schema drift. If TS errors
            appear in this PR's CI, that's the schema vs. code drift
            this is meant to surface — review and update the affected
            call sites.
